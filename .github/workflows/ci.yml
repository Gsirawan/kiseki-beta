name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: |
          go mod download
          go mod verify

      - name: Vet
        run: go vet -tags "fts5" ./...

      - name: Test
        run: go test -tags "fts5" -v -race ./...

      - name: Build
        run: go build -tags "fts5" -o kiseki .
